<!doctype html>
<html lang="my">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#f38020" />
<title>R2 Uploader</title>
<style>
  :root { color-scheme: light dark; --brand:#f38020; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    max-width: 560px; margin: 0 auto;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    line-height: 1.5;
  }
  h1 { font-size: 20px; margin: 8px 0 4px; }
  p.sub { margin: 0 0 16px; opacity: .75; font-size: 14px; }
  label { display:block; margin-top: 14px; font-weight: 600; font-size: 14px; }
  input[type=url], input[type=text] {
    width:100%; padding:12px 14px; border:1px solid #8886; border-radius:10px;
    font-size:16px; background: transparent; color: inherit;
  }
  input:focus { outline:2px solid var(--brand); border-color: transparent; }
  .check {
    margin-top: 10px; display:flex; gap:10px; align-items:flex-start;
    padding: 12px; border-radius: 10px; background:#8881; border:1px solid #8883;
  }
  .check input { width: 20px; height: 20px; margin-top:2px; }
  .check label { margin:0; font-weight:600; font-size:14px; }
  .check small { display:block; opacity:.7; font-weight:400; margin-top:2px; }
  .group-title { margin-top:18px; font-weight:700; font-size:13px; opacity:.8; text-transform:uppercase; letter-spacing:.5px; }
  button {
    margin-top: 18px; width: 100%; padding: 14px;
    font-size: 16px; font-weight: 600;
    border: 0; border-radius: 12px; background: var(--brand); color:#fff;
    cursor: pointer;
  }
  button:disabled { opacity:.6; cursor:not-allowed; }
  button.secondary { background:#555; margin-top: 8px; }
  .card {
    margin-top: 18px; padding: 14px; border-radius: 12px;
    background: #8881; border: 1px solid #8883;
  }
  .row { display:flex; gap:8px; align-items:center; }
  .url {
    flex: 1; word-break: break-all; font-family: ui-monospace, Menlo, monospace;
    font-size: 13px; padding: 8px; background:#0002; border-radius: 8px;
  }
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background:#222; color:#fff; padding: 10px 16px; border-radius: 999px;
    font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events:none; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  pre {
    background:#0002; padding:12px; border-radius:10px; white-space:pre-wrap;
    word-break:break-all; margin-top:12px; font-size:12px;
  }
  small { opacity:.7; }
  .ok { color:#1aa260; }
  .err { color:#d33; }
  .progress-wrap {
    margin-top: 10px; height: 10px; border-radius: 999px;
    background: #8883; overflow: hidden;
  }
  .progress-bar {
    height: 100%; width: 0%; background: var(--brand);
    transition: width .25s ease;
  }
  .meta { display:flex; justify-content:space-between; font-size: 12px; opacity:.8; margin-top:6px; }
  .link-block { margin-top: 12px; }
  .link-block .label { font-weight:600; font-size:14px; margin-bottom:6px; }
</style>
</head>
<body>
  <h1>☁️ R2 Remote Uploader</h1>
  <p class="sub">Remote URL ထည့်ပြီး R2 bucket ထဲ တင်ပါ။ MP4 + HLS (m3u8) ကို သီးခြားစီ ရွေးတင်နိုင်တယ်။</p>

  <label for="url">Remote File URL *</label>
  <input id="url" type="url" inputmode="url" autocomplete="off"
         placeholder="https://example.com/video.mp4 (သို့) https://.../master.m3u8" />

  <label for="key">Object Key (optional)</label>
  <input id="key" type="text" autocomplete="off"
         placeholder="folder/myfile.mp4" />

  <div class="group-title">📤 R2 ကို ဘာတင်မလဲ ရွေးပါ</div>

  <div class="check">
    <input id="outMp4" type="checkbox" checked />
    <label for="outMp4">
      📦 MP4 တင်မယ်
      <small>Source က m3u8 ဆိုရင် ffmpeg နဲ့ MP4 ပြောင်းပြီး တင်ပေးမယ်</small>
    </label>
  </div>

  <div class="check">
    <input id="outHls" type="checkbox" />
    <label for="outHls">
      🎬 HLS (m3u8) တင်မယ်
      <small>Source က MP4 ဆိုရင် ffmpeg နဲ့ HLS segment ထုတ်တင်မယ်။ Source က m3u8 ဆိုရင် segment တွေပါ R2 ပေါ် mirror လုပ်မယ် (folder: <code>{name}_hls/</code>)</small>
    </label>
  </div>

  <div class="check">
    <input id="faststart" type="checkbox" checked />
    <label for="faststart">
      🚀 MP4 Fast Start
      <small>video play မြန်စေဖို့ moov atom ကို ဖိုင်ရှေ့ပို့ပေးမယ် (mp4 output အတွက်သာ၊ ffmpeg လိုတယ်)</small>
    </label>
  </div>

  <button id="go">⬆️ Upload to R2</button>

  <div id="result" class="card" hidden>
    <div id="status"></div>
    <div id="progressWrap" hidden>
      <div class="progress-wrap"><div id="bar" class="progress-bar"></div></div>
      <div class="meta">
        <span id="phase">—</span>
        <span id="pctText">0%</span>
      </div>
    </div>

    <div id="mp4Box" class="link-block" hidden>
      <div class="label">📦 MP4 URL</div>
      <div class="row"><div id="mp4Url" class="url"></div></div>
      <div class="row" style="margin-top:8px; gap:8px;">
        <button id="copyMp4" class="secondary" style="margin:0;">📋 Copy</button>
        <button id="openMp4" class="secondary" style="margin:0;">↗ Open</button>
      </div>
    </div>

    <div id="hlsBox" class="link-block" hidden>
      <div class="label">🎬 HLS Playlist (m3u8)</div>
      <div class="row"><div id="hlsUrl" class="url"></div></div>
      <div class="row" style="margin-top:8px; gap:8px;">
        <button id="copyHls" class="secondary" style="margin:0;">📋 Copy</button>
        <button id="openHls" class="secondary" style="margin:0;">↗ Open</button>
      </div>
    </div>

    <details style="margin-top:12px;">
      <summary><small>Raw response</small></summary>
      <pre id="raw"></pre>
    </details>
  </div>

  <div id="toast" class="toast">Copied ✓</div>

<script>
const $ = (id) => document.getElementById(id);
const toast = (msg) => {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1600);
};

function fmtBytes(n) {
  if (!n || isNaN(n)) return '—';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0; while (n >= 1024 && i < u.length-1) { n/=1024; i++; }
  return n.toFixed(n < 10 ? 2 : 1) + ' ' + u[i];
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (_) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_) {}
    document.body.removeChild(ta);
    return ok;
  }
}

function setProgress(p) {
  $('bar').style.width = Math.max(0, Math.min(100, p.percent || 0)) + '%';
  $('pctText').textContent = (p.percent || 0) + '%';
  const sizeStr = p.total
    ? `${fmtBytes(p.loaded)} / ${fmtBytes(p.total)}`
    : (p.loaded ? fmtBytes(p.loaded) : '');
  $('phase').textContent = (p.phase || p.status || '') + (sizeStr ? ` · ${sizeStr}` : '');
}

function bindLinkActions() {
  $('copyMp4').onclick = async () => {
    const t = $('mp4Url').textContent;
    if (!t) return;
    toast((await copyText(t)) ? 'MP4 link copied ✓' : 'Copy မရဘူး');
  };
  $('openMp4').onclick = () => {
    const t = $('mp4Url').textContent; if (t) window.open(t, '_blank', 'noopener');
  };
  $('copyHls').onclick = async () => {
    const t = $('hlsUrl').textContent;
    if (!t) return;
    toast((await copyText(t)) ? 'HLS link copied ✓' : 'Copy မရဘူး');
  };
  $('openHls').onclick = () => {
    const t = $('hlsUrl').textContent; if (t) window.open(t, '_blank', 'noopener');
  };
}
bindLinkActions();

$('go').addEventListener('click', async () => {
  const url = $('url').value.trim();
  const key = $('key').value.trim();
  const faststart = $('faststart').checked;
  const outMp4 = $('outMp4').checked;
  const outHls = $('outHls').checked;
  if (!url) { toast('URL ထည့်ပါ'); return; }
  if (!outMp4 && !outHls) { toast('MP4 (သို့) HLS တစ်ခုခု ရွေးပါ'); return; }

  $('go').disabled = true;
  $('go').textContent = '⏳ Uploading...';
  $('result').hidden = false;
  $('mp4Box').hidden = true;
  $('hlsBox').hidden = true;
  $('progressWrap').hidden = false;
  $('bar').style.width = '0%';
  $('pctText').textContent = '0%';
  $('phase').textContent = 'starting...';
  $('status').innerHTML = '⏳ <b>Uploading...</b> ဖိုင်ကြီးရင် ခဏစောင့်ပါ။';
  $('raw').textContent = '';

  try {
    const r = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, key, faststart, outMp4, outHls }),
    });
    const start = await r.json();
    if (!r.ok || !start.jobId) {
      $('status').innerHTML = '<span class="err">❌ Failed:</span> ' + (start.error || r.status);
      return;
    }

    await new Promise((resolve) => {
      const es = new EventSource(`/api/progress/${start.jobId}`);
      es.onmessage = (ev) => {
        let p; try { p = JSON.parse(ev.data); } catch { return; }
        setProgress(p);
        if (p.status === 'done') {
          es.close();
          const data = p.result || {};
          $('raw').textContent = JSON.stringify(data, null, 2);

          let tags = '';
          if (data.faststart) tags += ' · <small>faststart ✓</small>';
          if (data.hls) tags += ` · <small>HLS ✓ (${data.hlsSegmentCount || 0} segments)</small>`;
          if (data.mp4) tags += ' · <small>MP4 ✓</small>';
          if (data.mp4Requested && !data.mp4)
            tags += ` · <small class="err">MP4 skipped</small>`;
          if (data.hlsRequested && !data.hls)
            tags += ` · <small class="err">HLS skipped</small>`;

          $('status').innerHTML = '<span class="ok">✅ Uploaded!</span> Source: <code>' + (data.sourceType || '?') + '</code>' + tags;

          if (data.publicUrl) {
            $('mp4Box').hidden = false;
            $('mp4Url').textContent = data.publicUrl;
            copyText(data.publicUrl).then(ok =>
              toast(ok ? 'MP4 link copied ✓' : 'Copy မရဘူး — ကိုယ်တိုင်နှိပ်ပါ'));
          } else if (data.mp4Requested && !data.mp4) {
            $('mp4Box').hidden = false;
            $('mp4Url').textContent = '(MP4 မထွက်နိုင်ပါ — ' + (data.skippedReason || 'unknown') + ')';
            $('copyMp4').disabled = true;
            $('openMp4').disabled = true;
          }

          if (data.hlsPlaylistUrl) {
            $('hlsBox').hidden = false;
            $('hlsUrl').textContent = data.hlsPlaylistUrl;
          } else if (data.hls && !data.hlsPlaylistUrl) {
            $('hlsBox').hidden = false;
            $('hlsUrl').textContent = '(R2_PUBLIC_BASE env မထည့်ထားလို့ HLS URL ပြန်မပြနိုင်ပါ)';
            $('copyHls').disabled = true;
            $('openHls').disabled = true;
          }
          resolve();
        } else if (p.status === 'error') {
          es.close();
          $('status').innerHTML = '<span class="err">❌ Failed:</span> ' + (p.error || 'unknown');
          resolve();
        }
      };
      es.onerror = () => {
        es.close();
        $('status').innerHTML = '<span class="err">❌</span> connection lost';
        resolve();
      };
    });
  } catch (e) {
    $('status').innerHTML = '<span class="err">❌</span> ' + e.message;
  } finally {
    $('go').disabled = false;
    $('go').textContent = '⬆️ Upload to R2';
  }
});

$('url').addEventListener('focus', async () => {
  if ($('url').value) return;
  try {
    const t = await navigator.clipboard.readText();
    if (t && /^https?:\/\//i.test(t)) $('url').value = t.trim();
  } catch (_) {}
});
</script>
</body>
</html>
